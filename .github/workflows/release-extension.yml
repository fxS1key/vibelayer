name: Release extension

on:
  push:
    tags: ['ext-v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@vibelayer/extension
      - run: cd extension/dist && zip -r ../../vibelayer-extension-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: vibelayer-extension-${{ github.ref_name }}.zip
